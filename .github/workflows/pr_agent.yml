# Explanations
# - Use this page: https://qodo-merge-docs.qodo.ai/ai_search/ to better understand how to utilize the different configurations found in https://github.com/qodo-ai/pr-agent/blob/main/pr_agent/settings/configuration.toml
# - https://mindport.atlassian.net/wiki/spaces/COMPANY/pages/edit-v2/384466945#QoDo-Free-%2F-Self-hosted
# - https://qodo-merge-docs.qodo.ai/installation/github/#run-as-a-github-action
# - https://qodo-merge-docs.qodo.ai/usage-guide/changing_a_model/
# - https://github.com/qodo-ai/pr-agent/blob/main/pr_agent/settings/configuration.toml

on:
  #  pull_request:
  #    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]
jobs:
  pr_agent_job:
    # block bots and only run in pull_request
    if: ${{ github.event.sender.type != 'Bot' && github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run pr agent (Qodo Merge) on user comments
    steps:
      - name: PR Agent action step
        id: pragent
        uses: qodo-ai/pr-agent@main
        env:
          # Provide your OpenAI key and GitHub token as repository secrets
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Mirrors [config] section
          config.model: "gpt-5.3-codex"
          config.reasoning_effort: "high"
          config.model_weak: "gpt-5.4-mini"
          config.fallback_models: '["gpt-5.4-mini"]'
          config.max_model_tokens: 2000000

          # Mirrors [github_action_config] section
          github_action_config.auto_review: "false" # enable\disable auto review
          github_action_config.auto_describe: "false" # enable\disable auto describe
          github_action_config.auto_improve: "false" # enable\disable auto improve

          # Mirrors [pr_reviewer] section
          pr_reviewer.require_security_review: "false"

          # Mirrors [pr_code_suggestions] section
          pr_code_suggestions.focus_only_on_problems: "true"
          pr_code_suggestions.suggestions_score_threshold: "3"
          pr_code_suggestions.dual_publishing_score_threshold: "7"
          pr_code_suggestions.demand_code_suggestions_self_review: true
          pr_code_suggestions.extra_instructions: "Ensure proper use of Unity's coding standards like Unity's component-based architecture, ensuring that classes are not overly complex and responsibilities are well-distributed."
